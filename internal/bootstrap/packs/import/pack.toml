# gc-import — legacy compatibility pack for older package-manager experiments.
#
# Built-in `gc import` in the Go CLI is authoritative. This pack remains
# in-tree only so older bootstrap/cache experiments still have a fixture.

[pack]
name = "import"
version = "0.2.0"
schema = 1
description = "Legacy compatibility pack for older gc import experiments; built-in Go gc import is authoritative"

[[commands]]
name = "add"
description = "Add a pack to the city's imports (source)"
script = "commands/add.py"

[[commands]]
name = "remove"
description = "Remove a pack from imports and prune transitive deps"
script = "commands/remove.py"

[[commands]]
name = "install"
description = "Restore the city to the exact state in pack.lock"
script = "commands/install.py"

[[commands]]
name = "upgrade"
description = "Re-resolve constraints and bump pack.lock"
script = "commands/upgrade.py"

[[commands]]
name = "list"
description = "Show what this city imports (use --tree for the dependency graph)"
script = "commands/list.py"

[[doctor]]
name = "python3.11"
description = "Verify Python 3.11+ is available (gc import uses tomllib from stdlib)"
script = "doctor/check-python.sh"
